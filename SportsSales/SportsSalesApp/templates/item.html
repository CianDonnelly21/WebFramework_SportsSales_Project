<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sports Sales App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/item/">Sports Sales</a>

    <div>
      <a href="/item/" class="btn btn-outline-light me-2">Items</a>
      <a href="/order/" class="btn btn-outline-light me-2">Orders</a>

      <form action="/logout/" method="post" style="display:inline;">
        {% csrf_token %}
        <button class="btn btn-danger">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="container">

    <h1 class="mb-4">Products</h1>

    <div class="row">
        {% for item in items %}
        <div class="col-md-4">
            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ item.name }}</h5>
                    <p class="text-muted">{{ item.description }}</p>
                    <p><strong>€{{ item.price }}</strong></p>

                    <form method="post" action="/order/">
                        {% csrf_token %}
                        <input type="hidden" name="item_id" value="{{ item.item_id }}">
                        <button class="btn btn-primary w-100">Add to Order</button>
                    </form>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
