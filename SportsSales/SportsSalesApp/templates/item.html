<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Sports Sales App </title>
</head>
<body>
    <h1> Products </h1>

    {% for item in items %}
    <div style = "margin-bottom:20px; padding:10px; width: 30%; border:1px solid;">
        <p> {{item.name}} - ${{item.price}}</p>
        <p> {{item.description}} </p>

        <form method="post" action="/order/">
            {% csrf_token %}
            <input type="hidden" name="item_id" value="{{ item.item_id }}">
            <button type="submit">Buy Item</button>
        </form>

    </div>
    {% endfor %}
</body>
</html>
